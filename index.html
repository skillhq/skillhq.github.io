<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillHQ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, #999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.25rem;
            color: #888;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .link {
            display: inline-block;
            padding: 0.75rem 2rem;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e5e5e5;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .link:hover {
            border-color: #666;
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SkillHQ</h1>
        <p>Open-source skills for AI agents.</p>
        <a href="https://github.com/skillhq" class="link">View on GitHub</a>
    </div>
</body>
</html>
